# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# --- Launch apps ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, B, exec, $terminal -e bluetui
bind = $mainMod SHIFT, A, exec, $terminal -e wiremix -v output
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod SHIFT, D, exec, ~/.config/scripts/powermenu
bind = $mainMod ALT, L, exec, cosmic-greeter
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod, O, exec, foot --app-id mybtop -e btop

# --- Close window ---
bind = $mainMod SHIFT, Q, hy3:killactive,
bind = $mainMod, Q, hy3:killactive,

# --- Focus (vim) ---
bind = $mainMod, h, hy3:movefocus, l
bind = $mainMod, l, hy3:movefocus, r
bind = $mainMod, k, hy3:movefocus, u
bind = $mainMod, j, hy3:movefocus, d
bind = $mainMod, left, hy3:movefocus, l
bind = $mainMod, right, hy3:movefocus, r
bind = $mainMod, up, hy3:movefocus, u
bind = $mainMod, down, hy3:movefocus, d

# --- Move windows (vim) ---
bind = $mainMod SHIFT, h, hy3:movewindow, l
bind = $mainMod SHIFT, l, hy3:movewindow, r
bind = $mainMod SHIFT, k, hy3:movewindow, u
bind = $mainMod SHIFT, j, hy3:movewindow, d
bind = $mainMod SHIFT, left, hy3:movewindow, l
bind = $mainMod SHIFT, right, hy3:movewindow, r
bind = $mainMod SHIFT, up, hy3:movewindow, u
bind = $mainMod SHIFT, down, hy3:movewindow, d

# --- Move workspace to monitor ---
bind = $mainMod CTRL SHIFT, h, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, l, movecurrentworkspacetomonitor, r

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Fullscreen ---
bind = $mainMod, f, fullscreen
bind = $mainMod SHIFT, F, fullscreen

# --- Layout (hy3) ---
# Match Sway: $mod+e = toggle split direction, $mod+w = tabbed, $mod+s = stacking
bind = $mainMod, E, hy3:changegroup, opposite       # toggle h<->v split (Sway: $mod+e layout toggle split)
bind = $mainMod, W, hy3:makegroup, tab              # tabbed group      (Sway: $mod+w layout tabbed)
bind = $mainMod, S, hy3:makegroup, v                # vertical group    (Sway: $mod+s layout stacking)
bind = $mainMod, G, hy3:changegroup, toggletab      # toggle tab on existing group
bind = $mainMod ALT, E, hy3:expand, expand
bind = $mainMod ALT SHIFT, E, hy3:expand, base

# --- Layout switch ---
bind = $mainMod ALT, S, exec, hyprctl keyword general:layout scrolling
bind = $mainMod ALT, I, exec, hyprctl keyword general:layout hy3

# --- Scrolling layout binds (active when layout = scrolling) ---
bind = $mainMod ALT, h, layoutmsg, focus l
bind = $mainMod ALT, l, layoutmsg, focus r
bind = $mainMod ALT, k, layoutmsg, focus u
bind = $mainMod ALT, j, layoutmsg, focus d
bind = $mainMod ALT SHIFT, h, layoutmsg, swapcol l
bind = $mainMod ALT SHIFT, l, layoutmsg, swapcol r
bind = $mainMod ALT, equal, layoutmsg, colresize +conf
bind = $mainMod ALT, minus, layoutmsg, colresize -conf

# --- Floating ---
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, hy3:togglefloatheight,

# --- Resize ---
bind = $mainMod, minus, resizeactive, -10 0
bind = $mainMod, equal, resizeactive, 10 0
bind = $mainMod SHIFT, minus, resizeactive, 0 -10
bind = $mainMod SHIFT, equal, resizeactive, 0 10
bind = $mainMod CTRL, h, resizeactive, -20 0
bind = $mainMod CTRL, l, resizeactive, 20 0
bind = $mainMod CTRL, k, resizeactive, 0 -20
bind = $mainMod CTRL, j, resizeactive, 0 20

# --- Screenshots ---
bind = , PRINT, exec, sh -lc "flameshot gui --raw | wl-copy"
bind = CTRL, PRINT, exec, grimshot save screen
bind = ALT, PRINT, exec, grimshot save window

# --- Volume ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Brightness ---
bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 10%-

# --- Media ---
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# --- Display toggle ---
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/scripts/toggle-edp.sh
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/toggle-external.sh

# --- Zoom (output scale) ---
bind = $mainMod ALT, M, exec, ~/.config/hypr/scripts/hyprctl-zoom in
bind = $mainMod ALT, N, exec, ~/.config/hypr/scripts/hyprctl-zoom out

# --- Session ---
bind = $mainMod SHIFT, E, exec, loginctl terminate-user $USER
bind = CTRL ALT, Delete, exit,

# --- Reload ---
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, R, exec, hyprctl reload

# --- Lock ---
bind = $mainMod, ESCAPE, exec, hyprlock

# --- Misc ---
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod SHIFT, COMMA, exec, makoctl dismiss --all
bind = $mainMod SHIFT, SPACE, exec, pkill waybar || waybar

# --- Mouse binds ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
